<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Oracle ERP Control Center</title>
	<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
	<div class="app-shell">
	<div class="sidebar d-flex flex-column">
		<div class="brand-block">
			<div class="brand-logo">
				<i class="fas fa-database"></i>
			</div>
			<div>
				<p class="brand-kicker">Parking ERP</p>
				<h3>Oracle Control</h3>
			</div>
		</div>
		<nav class="nav-stack">
			<a href="/" class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}">
				<i class="fas fa-chart-pie"></i><span>Dashboard</span>
			</a>
			<a href="/employees" class="nav-link {% if request.endpoint == 'employees' %}active{% endif %}">
				<i class="fas fa-users"></i><span>Employees</span>
			</a>
			<a href="/tickets" class="nav-link {% if request.endpoint == 'tickets' %}active{% endif %}">
				<i class="fas fa-ticket-alt"></i><span>Tickets</span>
			</a>
		</nav>
		<div class="sidebar-footer">
			<p>Vue moderne pour suivre l'activite de l'equipe en un coup d'oeil.</p>
		</div>
	</div>
	<div class="content">
		<div class="topbar">
			<div>
				<span class="eyebrow">Administration</span>
				<h2>Workspace analytique</h2>
			</div>
			<div class="topbar-badge">
				<i class="fas fa-circle"></i>
				<span>Live data</span>
			</div>
		</div>
		<div class="container-fluid px-0">
			{% block content %}
			{% endblock %}
		</div>
	</div>
	</div>
</body>
</html>
